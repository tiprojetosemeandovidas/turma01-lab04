
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ponto do Charme</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Ponto do Charme</h1>
  <nav>
    <a href="#servicos">Serviços</a>
    <a href="#galeria">Galeria</a>
    <a href="#agendamento">Agendar</a>
  </nav>
</header>

<section class="hero">
  <div>
    <h2>Realce sua beleza</h2>
    <p>Cabelos, unhas e maquiagem com qualidade</p>
    <a href="#agendamento" class="btn">Agendar horário</a>
  </div>
</section>

<section id="servicos">
  <h2>Serviços</h2>

  <div class="cards">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9">
      <h3>Cabelos</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1604654894610-df63bc536371">
      <h3>Unhas</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1512496015851-a90fb38ba796">
      <h3>Maquiagem</h3>
    </div>
  </div>
</section>

<section id="galeria">
  <h2>Nosso Espaço</h2>
  <div class="galeria">
    <img src="https://images.unsplash.com/photo-1521590832167-7bcbfaa6381f">
    <img src="https://images.unsplash.com/photo-1595476108010-b4d1f102b1b1">
    <img src="https://images.unsplash.com/photo-1582095133179-bfd08e2fc6b3">
  </div>
</section>

<section id="agendamento">
  <h2>Agende seu horário</h2>

  <form id="form">
    <input type="text" id="nome" placeholder="Seu nome" required>

    <select id="servico">
      <option value="">Serviço</option>
      <option>Cabelos</option>
      <option>Unhas</option>
      <option>Maquiagem</option>
    </select>

    <input type="date" id="data">

    <select id="hora">
      <option>Escolha um horário</option>
    </select>

    <button type="submit">Agendar via WhatsApp</button>
  </form>
</section>

<footer>
  <p>© 2026 Ponto do Charme</p>
</footer>

<script src="script.js"></script>
</body>
</html>
